# Configuration for `cargo deny` (https://embarkstudios.github.io/cargo-deny/).
# Run locally with: cargo deny check

[advisories]
version = 2
# Security advisories from the RustSec database are denied by default.
# These two are "unmaintained" advisories (not vulnerabilities), pulled in
# transitively by Alloy with no safe upgrade available on our end.
ignore = [
  "RUSTSEC-2024-0436", # paste - no longer maintained
  "RUSTSEC-2026-0173", # proc-macro-error2 - unmaintained
]

[licenses]
version = 2
# Common permissive licenses used across the Rust/Alloy ecosystem.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",            # webpki-root-certs, transitive via reqwest -> alloy-provider
]
confidence-threshold = 0.8
# Our own sovra-* crates are unpublished (publish = false) and intentionally carry
# no license field (the project links a non-commercial dependency); skip them.
private = { ignore = true }

[bans]
# Surface duplicate versions of the same crate without failing the build.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
